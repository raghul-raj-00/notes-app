<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Notes{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'styles/style.css' %}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .note-card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        .btn-press:active { transform: scale(0.98); }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen">

{% if user.is_authenticated %}
<header class="topbar bg-white border-b border-slate-200 px-4 py-3 sticky top-0 z-50 shadow-sm">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold text-indigo-600 flex items-center gap-2">
            <span class="text-2xl">📝</span> Notes App
        </h1>
        <nav class="flex gap-6">
            <a href="{% url 'note_list' %}" class="px-4 py-2 border border-gray-300 rounded-full text-sm font-medium text-black hover:text-indigo-600 transition-colors">Home</a>
            <a href="{% url 'create_note' %}" class="px-4 py-2 border border-gray-300 rounded-full text-sm font-medium text-black bg-yellow-200 hover:text-indigo-600 transition-colors">New Note</a>
            <a href="{% url 'logout' %}" class="px-4 py-2 border border-gray-300 rounded-full text-sm font-medium text-red-500 hover:text-red-600 transition-colors">Logout</a>
        </nav>
    </div>
</header>
{% endif %}

<div class="wrapper max-w-5xl mx-auto px-4 py-8 fade-in">
    {% block content %}{% endblock %}
</div>

</body>
</html>
