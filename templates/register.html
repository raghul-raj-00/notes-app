<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Notes App</title>
    <link rel="stylesheet" href="{% static 'styles/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="topbar">
    <h1>📝 Notes App</h1>
</header>

<div class="wrapper">
    <div class="form-container">
        <h1>Create Account</h1>
        <p class="form-subtitle">Get started with your notes</p>

        <form action="register" method="post">
            {% csrf_token %}

            <label for="first_name">First Name</label>
            <input type="text" name="first_name" id="first_name" placeholder="Enter your first name" required>

            <label for="last_name">Last Name</label>
            <input type="text" name="last_name" id="last_name" placeholder="Enter your last name" required>

            <label for="username">Username</label>
            <input type="text" name="username" id="username" placeholder="Choose a username" required>

            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="Enter your email" required>

            <label for="password1">Password</label>
            <input type="password" name="password1" id="password1" placeholder="Create a password" required>

            <label for="password2">Confirm Password</label>
            <input type="password" name="password2" id="password2" placeholder="Confirm your password" required>

            <button type="submit" class="btn btn-blue">Create Account</button>
        </form>

        <div class="form-footer">
            <p>Already have an account? <a href="{% url 'login' %}">Sign in</a></p>
        </div>
    </div>
</div>

</body>
</html>
