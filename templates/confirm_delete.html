{% extends 'notes_base.html' %}
{% block title %}Delete Note{% endblock %}

{% block content %}
<div class="form-container" style="max-width: 450px;">
    <div class="delete-icon">⚠️</div>
    <h1>Delete "{{ note.title }}"?</h1>
    <p class="form-subtitle">This action cannot be undone. The note and all its AI summaries will be permanently removed.</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-red" style="width: 100%;">Yes, Delete Permanently</button>
    </form>

    <div class="form-footer">
        <a href="{% url 'note_list' %}">No, Keep Note</a>
    </div>
</div>
{% endblock %}
