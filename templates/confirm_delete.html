{% extends 'notes_base.html' %}
{% block title %}Delete Note{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 text-center">
        <div class="text-red-500 text-5xl mb-6">⚠️</div>
        <h2 class="text-2xl font-bold text-slate-800 mb-3">Delete “{{ note.title }}”?</h2>
        <p class="text-slate-500 mb-8 leading-relaxed">This action cannot be undone. The note and all its AI summaries will be permanently removed.</p>

        <form method="POST" class="flex flex-col gap-3">
            {% csrf_token %}
            <button class="btn-press btn btn-red bg-red-500 text-white py-3 px-6 rounded-xl font-semibold hover:bg-red-600 transition-all shadow-md hover:shadow-red-100">
                Yes, Delete Permanently
            </button>
            <a href="{% url 'note_list' %}" class="btn-press btn btn-red bg red-500 rounded-xl text-slate-600 font-medium hover:bg-slate-100 transition-all border border-slate-200">
                No, Keep Note
            </a>
        </form>
    </div>
</div>
{% endblock %}
