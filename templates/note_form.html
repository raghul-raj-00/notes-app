{% extends 'notes_base.html' %}
{% block title %}{% if note %}Edit{% else %}Create{% endif %} Note{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="text-center mb-10">
        <h2 class="text-3xl font-bold text-slate-800 mb-2">
            {% if note %}Edit Note{% else %}Create Note{% endif %}
        </h2>
        <p class="text-slate-500">Capture your thoughts and ideas in a clean space.</p>
    </div>

    <<div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <div class="space-y-2">
                <label class="block text-sm font-semibold text-slate-700 ml-1">Title</label>
                <input type="text" name="title"
                       value="{{ note.title|default:'' }}"
                       placeholder="Give your note a title..."
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-slate-800 placeholder:text-slate-400"
                       required>
            </div>

            <div class="space-y-2">
                <<label class="block text-sm font-semibold text-slate-700 ml-1">Content</label>
                <textarea name="content" rows="8"
                          placeholder="Start writing..."
                          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-slate-800 placeholder:text-slate-400 resize-none"
                          required>{{ note.content|default:'' }}</textarea>
            </div>

            <div class="flex gap-3 pt-4">
                <a href="{% url 'note_list' %}" class="flex-1 text-center py-3 px-4 rounded-xl border border-slate-200 text-slate-600 font-medium hover:bg-slate-50 transition-all btn-press">
                    Cancel
                </a>
                <button class="btn-press btn btn-blue flex-[2] bg-indigo-600 text-white py-3 px-6 rounded-xl font-semibold hover:bg-indigo-700 transition-all shadow-md hover:shadow-indigo-200">
                    Save Note
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
