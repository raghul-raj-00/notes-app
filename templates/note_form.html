{% extends 'notes_base.html' %}
{% block title %}{% if note %}Edit{% else %}Create{% endif %} Note{% endblock %}

{% block content %}
<div class="form-container" style="max-width: 600px;">
    <h1>{% if note %}Edit Note{% else %}Create Note{% endif %}</h1>
    <p class="form-subtitle">Capture your thoughts and ideas in a clean space.</p>

    <form method="POST">
        {% csrf_token %}

        <label for="title">Title</label>
        <input type="text" name="title" id="title" value="{{ note.title|default:'' }}" placeholder="Give your note a title..." required>

        <label for="content">Content</label>
        <textarea name="content" id="content" rows="8" placeholder="Start writing..." required>{{ note.content|default:'' }}</textarea>

        <div class="form-actions">
            <a href="{% url 'note_list' %}" class="btn btn-grey">Cancel</a>
            <button type="submit" class="btn btn-blue">Save Note</button>
        </div>
    </form>
</div>
{% endblock %}
